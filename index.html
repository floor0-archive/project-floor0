<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Floor 0 - ARC SYSTEM</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    color: #eaeaea;
    overflow: hidden;
}

/* 🌌 SPACE BACKGROUND */
.bg {
    position: fixed;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle at center, #0b1020, #000);
    z-index: -2;
}

.bg::before {
    content: "";
    position: absolute;
    width: 200%;
    height: 200%;
    background-image: radial-gradient(white 1px, transparent 1px);
    background-size: 50px 50px;
    opacity: 0.15;
    animation: move 80s linear infinite;
}

@keyframes move {
    from { transform: translate(0,0); }
    to { transform: translate(-400px,-400px); }
}

/* CENTER */
.center {
    width: 100%;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* MAIN PANEL */
.container {
    display: flex;
    width: 900px;
    height: 550px;

    background: rgba(0,0,0,0.6);
    border: 1px solid #222;
    border-radius: 12px;
    backdrop-filter: blur(10px);
    overflow: hidden;
}

/* LEFT */
.left {
    width: 320px;
    padding: 20px;
    border-right: 1px solid #222;
}

/* RIGHT */
.right {
    flex: 1;
    padding: 20px;
}

/* INPUT */
input {
    width: 90%;
    padding: 6px;
    margin: 6px 0;
    background: #000;
    border: 1px solid #333;
    color: white;
}

/* BUTTON */
button {
    width: 100%;
    padding: 10px;
    margin-top: 8px;
    background: #111;
    border: 1px solid #333;
    color: white;
    cursor: pointer;
}

button:hover {
    border-color: #6ef3ff;
}

/* OUTPUT */
.output {
    white-space: pre-line;
    background: #0a0a0a;
    padding: 15px;
    border: 1px solid #222;
    min-height: 250px;
}

/* ARC DISPLAY */
.arc {
    margin-top: 15px;
    padding: 10px;
    border: 1px dashed #333;
    color: #aaa;
}
</style>
</head>

<body>

<div class="bg"></div>

<div class="center">

<div class="container">

<!-- LEFT -->
<div class="left">

<h3>⚔️ FLOOR 0 ARC SYSTEM</h3>

PHY<br>
<input id="phy" type="number" min="1" max="10">

PER<br>
<input id="per" type="number" min="1" max="10">

WIL<br>
<input id="wil" type="number" min="1" max="10">

<label>
<input type="checkbox" id="body">
🎯 Body Part
</label>

<button onclick="combat()">⚔️ COMBAT</button>
<button onclick="pulseUse()">⚡ PULSE USE</button>
<button onclick="showArc()">🔺 ARC STATUS</button>

<div class="arc" id="arcBox">
CORE SYSTEM READY
</div>

</div>

<!-- RIGHT -->
<div class="right">

<h3>OUTPUT</h3>
<div class="output" id="out">SYSTEM ONLINE...</div>

</div>

</div>

</div>

<script>

// =========================
// ARC CORE SYSTEM (NEW)
// =========================

// ONE CORE VALUE (0–100)
let CORE = 100;

// derived values (NO independent stats anymore)
let pulse = 100;
let stability = 100;

// =========================
// UTILS
// =========================
function roll(min,max){
    return Math.floor(Math.random()*(max-min+1))+min;
}

function clamp(min,max,v){
    return Math.max(min,Math.min(max,v));
}

// =========================
// ARC CALCULATION
// =========================

function getPulse(){
    return CORE;
}

function getStability(){
    return clamp(0,100, CORE - Math.floor((100 - CORE) * 0.5));
}

function getSync(){
    return clamp(0,100, (100 - CORE) * 1.2);
}

// =========================
// STATES
// =========================

function pulseState(p){
    if(p >= 100) return "Overflow";
    if(p >= 75) return "Stable";
    if(p >= 50) return "Fatigue";
    if(p >= 25) return "Exhaustion";
    return "Silence";
}

function syncState(s){
    if(s < 25) return "Origin";
    if(s < 50) return "Resonance";
    if(s < 75) return "Mutation";
    if(s < 100) return "Evolution";
    return "Echo";
}

function stabilityState(s){
    if(s >= 75) return "Lucid";
    if(s >= 50) return "Uneasy";
    if(s >= 25) return "Whispering";
    if(s > 0) return "Hallucination";
    return "Lost";
}

// =========================
// HIT SYSTEM
// =========================

function hitChance(PHY, PER){
    return clamp(10,90,50 + (PHY - PER) * 3);
}

// =========================
// DAMAGE SYSTEM (ARC BASED)
// =========================

function damageCalc(PHY){

    let base = PHY * 2;

    let sync = getSync();
    let stab = getStability();

    let syncMulti =
        sync < 25 ? 1.0 :
        sync < 50 ? 1.1 :
        sync < 75 ? 1.25 : 1.5;

    let stabMulti =
        stab >= 75 ? 1.0 :
        stab >= 50 ? 0.9 :
        stab >= 25 ? 0.75 : 0.6;

    return Math.floor(base * syncMulti * stabMulti);
}

// =========================
// COMBAT
// =========================

function combat(){

    let PHY = +document.getElementById("phy").value;
    let PER = +document.getElementById("per").value;

    let hc = hitChance(PHY,PER);
    let r = roll(1,100);

    let pulse = getPulse();
    let sync = getSync();
    let stab = getStability();

    if(r > hc){
        document.getElementById("out").innerText =
`⚔️ MISS
Roll: ${r}/${hc}

Pulse: ${pulse}%
Sync: ${sync.toFixed(1)}%
Stability: ${stab}%`;
        return;
    }

    let dmg = damageCalc(PHY);

    let msg = `⚔️ HIT\nDamage: ${dmg}`;

    if(document.getElementById("body").checked){
        const parts = ["Head","Chest","Arm","Leg","Shoulder","Abdomen"];
        msg += `\n🎯 ${parts[Math.floor(Math.random()*parts.length)]}`;
    }

    document.getElementById("out").innerText =
`${msg}

Pulse: ${pulse}%
Sync: ${sync.toFixed(1)}% (${syncState(sync)})
Stability: ${stab}% (${stabilityState(stab)})`;
}

// =========================
// PULSE USE (MODIFIES CORE)
// =========================

function pulseUse(){

    CORE = clamp(0,100, CORE - 10);

    document.getElementById("out").innerText =
`⚡ PULSE USED

CORE: ${CORE}

Pulse: ${getPulse()}%
Sync: ${getSync().toFixed(1)}%
Stability: ${getStability()}%`;
}

// =========================
// ARC DISPLAY
// =========================

function showArc(){

    document.getElementById("arcBox").innerText =
`🔺 ARC SYSTEM

CORE: ${CORE}

PULSE: ${getPulse()}% (${pulseState(getPulse())})
SYNC: ${getSync().toFixed(1)}% (${syncState(getSync())})
STABILITY: ${getStability()}% (${stabilityState(getStability())})`;
}

</script>

</body>
</html>
